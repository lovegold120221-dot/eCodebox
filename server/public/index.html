<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eburon Codebox</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <span class="sidebar-title">EXPLORER</span>
      <div class="sidebar-actions">
        <button id="new-file-btn" title="New File">+</button>
        <button id="new-folder-btn" title="New Folder">📁</button>
      </div>
    </div>
    <div id="file-tree"></div>
  </div>

  <div id="main">
    <div id="editor-tabs"></div>
    <div id="editor-container"></div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">
      <span>Eburon Codebox</span>
      <select id="model-select"><option value="">Loading...</option></select>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <textarea id="chat-input" rows="3" placeholder="Ask anything..."></textarea>
      <button id="chat-send">Send</button>
    </div>
  </div>
</div>

<div id="dialog-overlay" class="hidden">
  <div id="dialog-box">
    <div id="dialog-title"></div>
    <input id="dialog-input" type="text">
    <div id="dialog-actions">
      <button id="dialog-cancel">Cancel</button>
      <button id="dialog-confirm">OK</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script src="app.js"></script>
</body>
</html>
